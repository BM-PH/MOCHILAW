<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MOCHI LAW | 관제 시스템</title>
  <style>
    :root {
      --bg: #f4f7f6; --panel: rgba(255, 255, 255, 0.8); --card: #ffffff; --accent: #c29a68; 
      --text: #1a1a1a; --muted: #6c757d; --border: #e0e0e0; --danger: #ef4444; --success: #10b981;
      --shadow: 0 8px 20px rgba(0,0,0,0.05); --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #0d0d0d; --panel: rgba(20, 20, 20, 0.8); --card: #1a1a1a; --accent: #ebbe7f;
      --text: #f0f0f0; --muted: #a0a0a0; --border: #2d2d2d; --danger: #ff5f5f; --success: #34d399;
      --shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: -0.02em; }
    body { 
      margin: 0; font-family: "Pretendard", -apple-system, sans-serif; 
      background: var(--bg); color: var(--text); display: flex; flex-direction: column; 
      height: 100vh; overflow: hidden; transition: background 0.4s, color 0.4s;
    }
    
    header { 
      padding: 0 1.5rem; height: 60px; border-bottom: 1px solid var(--border); 
      display: flex; justify-content: space-between; align-items: center; 
      background: var(--panel); backdrop-filter: blur(15px); z-index: 100; flex-shrink: 0;
    }
    .logo-group h1 { margin: 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; }
    .logo-group span:first-child { color: var(--accent); margin-right: 4px; }
    
    .server-status { display: flex; gap: 15px; align-items: center; }
    .status-item { font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

    .main-container { flex: 1; display: flex; overflow: hidden; }
    .left-section { flex: 1; display: flex; flex-direction: column; padding: 1rem 1.5rem; overflow: hidden; }
    
    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; gap: 1rem; }
    .tabs { display: flex; gap: 6px; }
    .tab { 
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); 
      background: var(--card); color: var(--muted); cursor: pointer; 
      font-size: 0.8rem; font-weight: 700; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 4px 10px rgba(194, 154, 104, 0.3); }
    
    .search-bar { position: relative; width: 220px; }
    .search-bar input { 
      width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); 
      background: var(--card); color: var(--text); outline: none; font-size: 0.85rem; transition: 0.3s;
    }
    .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(194, 154, 104, 0.1); }

    .item-grid { 
      flex: 1; overflow-y: auto; display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 12px; align-content: start; padding-bottom: 15px;
    }
    /* 스크롤바 커스텀 */
    .item-grid::-webkit-scrollbar { width: 5px; }
    .item-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .item-card { 
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); 
      padding: 14px; cursor: pointer; position: relative; transition: all 0.3s ease;
      display: flex; flex-direction: column; gap: 6px;
    }
    .item-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
    .item-card.selected { border-color: var(--accent); background: linear-gradient(145deg, var(--card), var(--bg)); }
    .item-card .name { font-size: 0.9rem; font-weight: 800; }
    .item-card .price { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
    
    .qty-badge { 
      position: absolute; top: -8px; right: -8px; background: var(--accent); 
      color: #000; font-size: 0.7rem; font-weight: 900; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; border-radius: 6px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2); animation: pop 0.3s ease;
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

    .right-section { 
      width: 300px; background: var(--panel); backdrop-filter: blur(25px); 
      padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; 
      border-left: 1px solid var(--border);
    }
    .res-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); box-shadow: var(--shadow); }
    .res-label { font-size: 0.65rem; color: var(--muted); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.1em; }
    .res-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
    .res-ko { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    .calc-list { flex: 1; border-top: 1px solid var(--border); padding-top: 1rem; overflow-y: auto; }
    .calc-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .btn { 
      padding: 10px; border-radius: 10px; font-size: 0.85rem; font-weight: 800; border: none; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-copy { background: var(--accent); color: #000; }
    .btn-copy:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-convert { background: var(--text); color: var(--bg); }
    .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-reset:hover { background: var(--danger); color: white; }

    /* 모달 디자인 */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 9999; animation: fadeIn 0.2s ease; }
    .modal { background: var(--card); padding: 1.8rem; border-radius: 20px; width: 340px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .modal h2 { font-size: 1.1rem; margin-bottom: 1.2rem; text-align: center; font-weight: 800; }
    .modal input { 
      width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); 
      color: var(--text); border-radius: 10px; margin-bottom: 10px; outline: none; font-size: 0.85rem;
    }

    .theme-switch { position: fixed; bottom: 20px; left: 20px; z-index: 1000; display: flex; gap: 8px; background: var(--panel); padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
    .t-btn { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; background: transparent; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: 0.2s; }
    .t-btn:hover { background: var(--bg); }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 20px; border-radius: 10px; font-size: 0.85rem; font-weight: 800; visibility: hidden; opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10001; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    #toast.show { visibility: visible; opacity: 1; transform: translate(-50%, -10px); }
  </style>
</head>
<body data-theme="dark">

  <div class="theme-switch">
    <button class="t-btn" onclick="setT('dark')">🌑</button>
    <button class="t-btn" onclick="setT('light')">🍦</button>
  </div>

  <div id="infoModal" class="overlay">
    <div class="modal" onkeydown="if(event.key==='Enter') executeCopy()">
      <h2>📋 사건 보고서 작성</h2>
      <input type="text" id="modalId" placeholder="Discord Name">
      <input type="text" id="modalName" placeholder="피의자 성함">
      <input type="text" id="modalEtc" placeholder="비고 (특이사항)">
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn btn-copy" style="flex:1.5" onclick="executeCopy()">복사 및 발행</button>
        <button class="btn" style="flex:1; background:var(--border); color:var(--text)" onclick="closeModal()">취소</button>
      </div>
    </div>
  </div>

  <div id="qtyModal" class="overlay">
    <div class="modal" style="width:280px;">
      <h2 id="mTitle" style="color:var(--accent);">수량 설정</h2>
      <input type="number" id="mInput" value="1" onfocus="this.select()" onkeydown="if(event.key==='Enter') confirmQty()">
      <div style="display:flex; gap:8px;">
        <button class="btn btn-copy" style="flex:1.5" onclick="confirmQty()">확인</button>
        <button class="btn" style="flex:1; color:var(--danger); border:1px solid var(--danger); background:transparent;" onclick="removeIdx()">제거</button>
      </div>
    </div>
  </div>

  <header>
    <div class="logo-group"><h1><span>MOCHI</span> LAW CALCULATOR</h1></div>
    <div class="server-status">
        <div class="status-item"><span class="status-dot"></span> System Live</div>
        <div class="status-item">Ping: <span id="serverPing">--</span>ms</div>
        <div class="status-item">CPU: <span id="cpuUsage">--</span>%</div>
    </div>
  </header>

  <div class="main-container">
    <section class="left-section">
      <div class="nav-bar">
        <div class="tabs" id="tabs"></div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="검색어를 입력하세요..." oninput="renderList()">
        </div>
      </div>
      <div class="item-grid" id="itemList"></div>
    </section>

    <aside class="right-section">
      <div class="res-card">
        <div class="res-label">Estimated Fine</div>
        <div class="res-val" id="resFine">0원</div>
        <div class="res-ko" id="resFineKo">영 원</div>
      </div>
      <div class="res-card">
        <div class="res-label">Detention Time</div>
        <div class="res-val" id="resTime">0분</div>
        <div id="limitWarn" style="color:var(--danger); font-size:0.7rem; font-weight:800; margin-top:6px; display:none;">⚠️ 최대 120분을 초과했습니다</div>
      </div>
      
      <div style="padding: 0 5px;">
        <label style="font-size:0.7rem; font-weight:800; color:var(--muted); display:block; margin-bottom:6px;">보석금 감면 (1분당 500만)</label>
        <input type="number" id="bailIn" value="0" oninput="update()" style="width:100%; background:var(--card); border:1px solid var(--border); padding:10px; border-radius:10px; color:var(--accent); font-size:1rem; font-weight:800; outline:none; text-align:right;">
      </div>

      <div class="calc-list" id="calcRows"></div>

      <div class="btn-group">
        <button class="btn btn-convert" onclick="convertToTime()">벌금 미납 → 구금 전환</button>
        <button class="btn btn-copy" onclick="openInfoModal()">보고서 생성하기</button>
        <button class="btn btn-reset" onclick="resetAll()">계산기 초기화</button>
      </div>
    </aside>
  </div>

  <div id="toast">성공적으로 복사되었습니다.</div>

<script>
  const DATA = {
    "경범죄": [
      { name: "소음공해", fine: 10000000, time: 0 }, { name: "불법 주정차", fine: 10000000, time: 0 },
      { name: "속도 위반", fine: 10000000, time: 0 }, { name: "신호 위반", fine: 10000000, time: 0 },
      { name: "불법 유턴", fine: 10000000, time: 0 }, { name: "역주행", fine: 10000000, time: 0 },
      { name: "인도 주행", fine: 10000000, time: 0 }, { name: "공공기물 파손", fine: 10000000, time: 0 },
      { name: "스턴트", fine: 20000000, time: 0 }, { name: "차량파손", fine: 50000000, time: 10 },
      { name: "뺑소니", fine: 100000000, time: 20 }, { name: "폭주", fine: 50000000, time: 20 },
      { name: "항공기 저공 비행", fine: 300000000, time: 60 }, { name: "보복운전", fine: 200000000, time: 30 },
      { name: "무허가 항공기", fine: 300000000, time: 60 }
    ],
    "중범죄": [
      { name: "공범죄", fine: 0, time: 0, etc: "주범과 동일" },
      { name: "난폭운전", fine: 50000000, time: 30 },
      { name: "명예훼손", fine: 20000000, time: 10 },
      { name: "폭행", fine: 100000000, time: 20 },
      { name: "불법 물건 소지", fine: 80000000, time: 20 },
      { name: "불법 총기 소지", fine: 150000000, time: 20 },
      { name: "무기 언급", fine: 100000000, time: 20 },
      { name: "증거 인멸", fine: 200000000, time: 20 },
      { name: "차량 절도", fine: 100000000, time: 30 },
      { name: "시민 살인", fine: 300000000, time: 30 }
    ],
    "공무원법": [
      { name: "공무차량 절도시도", fine: 100000000, time: 0 }, { name: "공무원 명예훼손", fine: 200000000, time: 10 },
      { name: "공무차량 파손", fine: 100000000, time: 20 }, { name: "공무원 사칭", fine: 50000000, time: 20 },
      { name: "공무집행 방해", fine: 150000000, time: 30 }, { name: "침입죄", fine: 400000000, time: 10 },
      { name: "공무원 폭행", fine: 300000000, time: 30 }, { name: "공무차량 절도", fine: 400000000, time: 30 },
      { name: "공무원 살인", fine: 400000000, time: 40 }
    ],
    "스토리RP": [
      { name: "건샵", fine: 150000000, time: 0, etc: "무기 압수" },
      { name: "닭공장 털이", fine: 350000000, time: 30, etc: "인당 / 무기 압수" },
      { name: "보석상 털이", fine: 250000000, time: 20, etc: "인당 / 무기 압수" },
      { name: "북부은행", fine: 450000000, time: 20, etc: "인당 / 무기 압수" },
      { name: "남부은행", fine: 350000000, time: 20, etc: "인당 / 무기 압수" },
      { name: "편의점 털이", fine: 80000000, time: 10, etc: "인당 / 무기 압수" },
      { name: "ATM 털이", fine: 50000000, time: 10, etc: "인당 / 무기 압수" },
      { name: "빈집 털이", fine: 50000000, time: 10, etc: "인당 / 무기 압수" },
      { name: "납치", fine: 300000000, time: 10, etc: "인당 / 대상자 석방" },
      { name: "영장", fine: 300000000, time: 30, etc: "인당 / 불법 물건 압수" },
      { name: "최초 수배자", fine: 600000000, time: 40 },
      { name: "수배 참여", fine: 200000000, time: 20 },
      { name: "즉흥", fine: 200000000, time: 20 },
      { name: "도주", fine: 0, time: 0, etc: "관련 법률 추가 적용" }
    ]
  };

  let activeTab = "경범죄", curKey = null, isFineConverted = false;
  const state = new Map();

  function updateMonitoringData() {
      const ping = Math.floor(Math.random() * 5) + 24;
      const cpu = (Math.random() * 3 + 14).toFixed(1);
      document.getElementById("serverPing").textContent = ping; 
      document.getElementById("cpuUsage").textContent = cpu;
  }
  setInterval(updateMonitoringData, 2500); updateMonitoringData();

  function setT(t) { document.body.setAttribute("data-theme", t); }
  function showT(m) { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 2500); }

  function renderList() {
    const $l = document.getElementById("itemList"), query = document.getElementById("searchInput").value;
    let html = "";
    DATA[activeTab].forEach(item => {
      if(query && !item.name.includes(query)) return;
      const key = `${activeTab}::${item.name}`;
      const s = state.get(key) || {checked:false, qty:0};
      html += `<div class="item-card ${s.checked?'selected':''}" onclick="openQty('${activeTab}', '${item.name}')">
        <div class="name">${item.name}</div>
        <div class="price">${item.fine>0?(item.fine/10000).toLocaleString()+'만':'가변'} / ${item.time}분</div>
        ${s.checked?`<div class="qty-badge">${s.qty}</div>`:''}
      </div>`;
    });
    $l.innerHTML = html;
  }

  function openQty(cat, itemName) {
    curKey = `${cat}::${itemName}`; 
    const s = state.get(curKey);
    if(s && s.checked) { 
      state.delete(curKey);
      isFineConverted = false;
      renderList(); update(); 
    } else { 
      document.getElementById("mTitle").textContent = itemName; 
      document.getElementById("qtyModal").style.display = "flex"; 
      const input = document.getElementById("mInput");
      input.value = 1; setTimeout(()=>input.focus(), 50); 
    }
  }

  function confirmQty() { 
    const v = parseInt(document.getElementById("mInput").value); 
    if(v > 0) { 
      const [cat, name] = curKey.split("::");
      const item = DATA[cat].find(i => i.name === name);
      state.set(curKey, {checked: true, qty: v, item});
      isFineConverted = false;
    } 
    closeModal(); renderList(); update(); 
  }

  function update() {
    let baseFine = 0, baseTime = 0, rows = "";
    state.forEach((s, k) => {
      if(!s.checked) return;
      baseFine += s.item.fine * s.qty; baseTime += s.item.time * s.qty;
      rows += `<div class="calc-item"><span>${s.item.name} x${s.qty}</span><span>${(s.item.fine*s.qty/10000).toLocaleString()}만</span></div>`;
    });

    const bailIn = Math.max(0, parseInt(document.getElementById("bailIn").value)||0);
    let totalFine = baseFine + (bailIn * 5000000);
    let totalTime = Math.max(0, baseTime - bailIn);

    if(isFineConverted && totalFine > 0) {
      const conv = Math.floor(totalFine / 5000000);
      totalTime += conv; totalFine = 0;
      rows += `<div class="calc-item" style="color:var(--success)"><span>구금 전환 (+${conv}분)</span><span>0원</span></div>`;
    }

    document.getElementById("resFine").textContent = totalFine.toLocaleString() + "원";
    document.getElementById("resFineKo").textContent = numberToKo(totalFine) + " 원";
    document.getElementById("resTime").textContent = totalTime + "분";
    document.getElementById("limitWarn").style.display = (totalTime > 120 && !isFineConverted) ? "block" : "none";
    document.getElementById("calcRows").innerHTML = rows || '<div style="text-align:center; color:var(--muted); padding-top:30px; font-size:0.8rem;">선택된 항목이 없습니다.</div>';
  }

  function numberToKo(n) {
    if (n === 0) return "영";
    const big = ["", "만", "억", "조"], nums = ["", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구"], units = ["", "십", "백", "천"];
    let res = "", s = n.toString();
    for (let i = 0; i < s.length; i++) {
      let num = s[s.length - 1 - i], l = i % 4, bl = Math.floor(i / 4);
      if (num !== "0") {
        let c = nums[parseInt(num)] + units[l]; if (l === 0 && bl > 0) c += big[bl]; res = c + " " + res;
      } else if (l === 0 && bl > 0 && s.slice(Math.max(0, s.length-i-4), s.length-i).search(/[1-9]/) > -1) res = big[bl] + " " + res;
    }
    return res.trim();
  }

  function renderTabs() { 
    const $t = document.getElementById("tabs");
    $t.innerHTML = Object.keys(DATA).map(c => 
      `<button class="tab ${c===activeTab?'active':''}" onclick="activeTab='${c}';renderTabs();renderList();">${c}</button>`
    ).join("");
  }

  function openInfoModal() { 
    if(state.size === 0) { showT("항목을 먼저 선택해주세요!"); return; }
    document.getElementById("infoModal").style.display = "flex"; 
    setTimeout(()=>document.getElementById("modalId").focus(), 50); 
  }
  function closeModal() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }
  function removeIdx() { state.delete(curKey); closeModal(); renderList(); update(); }
  function resetAll() { if(confirm("초기화하시겠습니까?")) { state.clear(); document.getElementById("bailIn").value = 0; isFineConverted = false; renderList(); update(); } }
  function convertToTime() { isFineConverted = true; update(); showT("벌금이 구금 시간으로 전환되었습니다."); }

  function executeCopy() {
    const id = document.getElementById("modalId").value || "N/A", name = document.getElementById("modalName").value || "N/A", etc = document.getElementById("modalEtc").value || "없음";
    let txt = `[ 모찌서버 법률 집행 보고서 ]\nDiscord Name: ${id}\n피의자: ${name}\n비고: ${etc}\n\n[ 위반 내역 ]\n`;
    let bf = 0, bt = 0;
    state.forEach(s => {
      txt += `• ${s.item.name} x${s.qty}\n`;
      bf += s.item.fine * s.qty; bt += s.item.time * s.qty;
    });
    const bail = Math.max(0, parseInt(document.getElementById("bailIn").value)||0);
    let ff = bf + (bail * 5000000), ft = Math.max(0, bt - bail);
    if(isFineConverted) { const conv = Math.floor(ff/5000000); ft += conv; ff = 0; txt += `\n[ 특이사항 ] 벌금 미납 구금 전환 (+${conv}분)\n`; }
    txt += `\n최종 벌금: ${ff.toLocaleString()}원\n최종 구금: ${ft}분\n────────────────`;
    navigator.clipboard.writeText(txt).then(() => { showT("보고서가 클립보드에 복사되었습니다!"); closeModal(); });
  }

  renderTabs(); renderList(); update();
</script>
</body>
</html>
